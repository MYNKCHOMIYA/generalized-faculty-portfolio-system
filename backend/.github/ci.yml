name: FastAPI CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # 1. Grab the code from the repository
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Set up Python
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"

    # 3. Install the packages from requirements.txt
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Run the tests with mock Environment Variables
    - name: Run Pytest
      env:
        # We inject fake secrets here so Pydantic doesn't crash while booting up the test environment!
        POSTGRES_USER: ci_test
        POSTGRES_PASSWORD: ci_test
        POSTGRES_SERVER: localhost
        POSTGRES_DB: ci_test_db
        SECRET_KEY: super_secret_ci_key_123
        CLOUDINARY_CLOUD_NAME: test
        CLOUDINARY_API_KEY: test
        CLOUDINARY_API_SECRET: test
      run: |
        pytest -v