name: FastAPI CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  quality-and-testing:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install black flake8 pytest-cov

    - name: Check Code Formatting (Black)
      run: |
        black backend/ --check

    - name: Lint Code (Flake8)
      # This checks for critical Python syntax errors or undefined names
      run: |
        flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
        
    - name: Run Tests & Coverage (Pytest)
      env:
        PYTHONPATH: ./backend
        POSTGRES_USER: ci_test
        POSTGRES_PASSWORD: ci_test
        POSTGRES_SERVER: localhost
        POSTGRES_DB: ci_test_db
        SECRET_KEY: super_secret_ci_key_123
        CLOUDINARY_CLOUD_NAME: test
        CLOUDINARY_API_KEY: test
        CLOUDINARY_API_SECRET: test
      # This runs the tests and prints a report of how much of your 'app' folder is covered
      run: |
        pytest backend/tests/ -v --cov=app --cov-report=term-missing